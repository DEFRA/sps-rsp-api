name: APIM Self-Serve Scaffold (Internal/External, No Environment)

on:
  workflow_dispatch:
    inputs:
      templateSet:
        description: "Which template set to use"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - external

      templatesRoot:
        description: "Optional override for TemplatesRoot (leave blank to use templateSet)"
        required: false
        default: ""

      backup:
        description: "Create backup under TemplatesRoot/.bak/<timestamp>"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

      diagnostics:
        description: "Enable diagnostics logs + sample snippets (writes to TemplatesRoot/reports/)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  scaffold:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve TemplatesRoot + Run scaffold
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $templateSet   = "${{ github.event.inputs.templateSet }}"
          $overrideRoot  = "${{ github.event.inputs.templatesRoot }}"
          $backup        = "${{ github.event.inputs.backup }}"
          $diagnostics   = "${{ github.event.inputs.diagnostics }}"

          # Choose TemplatesRoot
          $templatesRoot = if ([string]::IsNullOrWhiteSpace($overrideRoot)) { $templateSet } else { $overrideRoot }

          Write-Host "[INFO] templateSet   = $templateSet"
          Write-Host "[INFO] templatesRoot = $templatesRoot"
          Write-Host "[INFO] backup        = $backup"
          Write-Host "[INFO] diagnostics   = $diagnostics"

          if (-not (Test-Path -LiteralPath $templatesRoot)) {
            throw "TemplatesRoot path not found in repo: '$templatesRoot'"
          }

          # Early file existence checks for clear failures
          $required = @(
            "input.json",
            "./scripts/Scaffold/api-onboarding.schema.json",
            "./scripts/Scaffold/mapping.json"
          )
          foreach ($p in $required) {
            if (-not (Test-Path -LiteralPath $p)) {
              throw "Missing required file: '$p'"
            }
          }

          Write-Host "[INFO] PowerShell: $($PSVersionTable.PSVersion)"
          Write-Host "[INFO] Listing templatesRoot (depth 1) for sanity..."
          Get-ChildItem -LiteralPath $templatesRoot -Force | Select-Object Mode,Name | Out-Host

          # Strongly-typed hashtable splat (name-bound, no positional ambiguity)
          $params = @{
            InputJson                  = "input.json"
            Schema                     = "./scripts/Scaffold/api-onboarding.schema.json"
            Mapping                    = "./scripts/Scaffold/mapping.json"
            TemplatesRoot              = $templatesRoot
            MaterializeTemplateFolders = $true
            AllowMissing               = $true
          }

          if ($backup -eq "true") {
            $params.BackupBeforeWrite = $true
          }
          if ($diagnostics -eq "true") {
            $params.Diagnostics    = $true
            $params.DiagSaveSamples = $true
          }

          Write-Host "[INFO] Running ./scripts/Scaffold/ApimApiScaffold.ps1 with params:"
          $params.GetEnumerator() | Sort-Object Name | ForEach-Object {
            $val = if ($_.Value -is [string]) { $_.Value } else { $_.Value.ToString() }
            Write-Host ("  - {0} = {1}" -f $_.Name, $val)
          }

          # Dot-invocation avoids the & call operator entirely (no HTML encoding issues)
          . ./scripts/Scaffold/ApimApiScaffold.ps1 @params

      - name: Commit and push changes
        shell: bash
        run: |
          set -e
          git status
          git diff --name-only

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          SET="${{ github.event.inputs.templateSet }}"
          git commit -m "APIM Self-Serve: scaffold + token mapping (set=${SET}) [CI]"
          git push origin HEAD:${{ github.ref_name }}
